<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UDBX Electron Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { font-size: 20px; margin-bottom: 16px; color: #333; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 16px; }
    button { padding: 8px 16px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
    button:hover { background: #f0f0f0; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-bottom: 12px; font-size: 13px; color: #666; }
    .status.error { color: #c00; }
    .panel { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .panel h2 { font-size: 15px; margin-bottom: 12px; color: #444; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 6px 10px; border-bottom: 1px solid #eee; }
    th { background: #fafafa; font-weight: 600; color: #555; }
    tr:hover { background: #f8f8f8; }
    .create-form { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    .create-form input, .create-form select { padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
    .create-form input { width: 160px; }
    .empty { color: #999; font-size: 13px; padding: 12px 0; }
  </style>
</head>
<body>
  <h1>UDBX Electron Demo</h1>

  <div class="toolbar">
    <button id="btn-open">Open UDBX File</button>
    <button id="btn-create">Create New UDBX</button>
  </div>

  <div id="status" class="status">No database loaded.</div>

  <div class="panel">
    <h2>Datasets</h2>
    <div class="create-form">
      <input id="new-dataset-name" placeholder="Dataset name" />
      <select id="new-dataset-kind">
        <option value="point">Point</option>
        <option value="line">Line</option>
        <option value="region">Region</option>
        <option value="tabular">Tabular</option>
      </select>
      <button id="btn-create-dataset" disabled>Create Dataset</button>
    </div>
    <div id="dataset-list">
      <div class="empty">No datasets.</div>
    </div>
  </div>

  <div class="panel">
    <h2>Features</h2>
    <div id="feature-list">
      <div class="empty">Select a dataset above to view features.</div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById("status");
    const datasetListEl = document.getElementById("dataset-list");
    const featureListEl = document.getElementById("feature-list");
    const btnOpen = document.getElementById("btn-open");
    const btnCreate = document.getElementById("btn-create");
    const btnCreateDataset = document.getElementById("btn-create-dataset");
    const newDatasetName = document.getElementById("new-dataset-name");
    const newDatasetKind = document.getElementById("new-dataset-kind");

    let datasets = [];

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = String(str);
      return div.innerHTML;
    }

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.className = isError ? "status error" : "status";
    }

    function clearElement(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    btnOpen.addEventListener("click", async () => {
      try {
        setStatus("Opening...");
        const result = await window.udbx.open();
        if (!result) {
          setStatus("No database loaded.");
          return;
        }
        datasets = result.datasets;
        renderDatasets();
        setStatus("Opened: " + result.path);
        btnCreateDataset.disabled = false;
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    btnCreate.addEventListener("click", async () => {
      try {
        setStatus("Creating...");
        const result = await window.udbx.create();
        if (!result) {
          setStatus("Cancelled.");
          return;
        }
        datasets = result.datasets;
        renderDatasets();
        setStatus("Created: " + result.path);
        btnCreateDataset.disabled = false;
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    btnCreateDataset.addEventListener("click", async () => {
      const name = newDatasetName.value.trim();
      const kind = newDatasetKind.value;
      if (!name) return;

      try {
        const info = await window.udbx.createDataset(kind, name, 4326);
        datasets.push(info);
        renderDatasets();
        newDatasetName.value = "";
        setStatus("Created dataset: " + name);
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    async function loadFeatures(datasetName) {
      try {
        const features = await window.udbx.getFeatures(datasetName, 100);
        clearElement(featureListEl);

        if (features.length === 0) {
          const div = document.createElement("div");
          div.className = "empty";
          div.textContent = "No features in this dataset.";
          featureListEl.appendChild(div);
          return;
        }

        const keys = Object.keys(features[0].attributes);
        const table = document.createElement("table");
        const thead = document.createElement("thead");
        let headerRow = "<tr><th>ID</th>";
        keys.forEach((k) => { headerRow += "<th>" + escapeHtml(k) + "</th>"; });
        headerRow += "</tr>";
        thead.innerHTML = headerRow;
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        features.forEach((f) => {
          const tr = document.createElement("tr");
          const tdId = document.createElement("td");
          tdId.textContent = String(f.id);
          tr.appendChild(tdId);
          keys.forEach((k) => {
            const td = document.createElement("td");
            td.textContent = String(f.attributes[k] ?? "");
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
        featureListEl.appendChild(table);
      } catch (err) {
        clearElement(featureListEl);
        const div = document.createElement("div");
        div.className = "empty error";
        div.textContent = err.message;
        featureListEl.appendChild(div);
      }
    }

    function renderDatasets() {
      clearElement(datasetListEl);

      if (datasets.length === 0) {
        const div = document.createElement("div");
        div.className = "empty";
        div.textContent = "No datasets.";
        datasetListEl.appendChild(div);
        return;
      }

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      thead.innerHTML = "<tr><th>ID</th><th>Name</th><th>Type</th><th>Count</th><th>SRID</th><th></th></tr>";
      table.appendChild(thead);

      const tbody = document.createElement("tbody");
      datasets.forEach((d) => {
        const tr = document.createElement("tr");

        const tdId = document.createElement("td");
        tdId.textContent = String(d.id);
        tr.appendChild(tdId);

        const tdName = document.createElement("td");
        tdName.textContent = d.name;
        tr.appendChild(tdName);

        const tdKind = document.createElement("td");
        tdKind.textContent = d.kind;
        tr.appendChild(tdKind);

        const tdCount = document.createElement("td");
        tdCount.textContent = String(d.objectCount);
        tr.appendChild(tdCount);

        const tdSrid = document.createElement("td");
        tdSrid.textContent = String(d.srid ?? "-");
        tr.appendChild(tdSrid);

        const tdAction = document.createElement("td");
        const btn = document.createElement("button");
        btn.textContent = "View";
        btn.addEventListener("click", () => loadFeatures(d.name));
        tdAction.appendChild(btn);
        tr.appendChild(tdAction);

        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      datasetListEl.appendChild(table);
    }
  </script>
</body>
</html>
